<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CN Live Suite</title>

    <link rel="stylesheet" href="style.css">

    <!-- Fonte -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>

</head>

<body>

<div class="app">

    <!-- SIDEBAR -->

    <aside class="sidebar">

        <div class="logo">

            <h1>CN Live Suite</h1>

            <span>v1.0</span>

        </div>

        <div class="menu">

            <div class="menu-title">GERAL</div>

            <button class="item active">

                <i data-lucide="layout-dashboard"></i>

                Dashboard

            </button>

            <div class="menu-title">

                WIDGETS

            </div>

            <button class="item">

                <i data-lucide="image"></i>

                Logo

            </button>

            <button class="item">

                <i data-lucide="message-circle"></i>

                Chat

            </button>

            <button class="item">

                <i data-lucide="qr-code"></i>

                LivePix

            </button>

            <button class="item">

                <i data-lucide="cloud-sun"></i>

                Clima

            </button>

            <button class="item">

                <i data-lucide="bell-ring"></i>

                Alertas

            </button>

            <button class="item">

                <i data-lucide="monitor-play"></i>

                Plataforma

            </button>

            <button class="item">

                <i data-lucide="map-pinned"></i>

                GPS

            </button>

            <div class="menu-title">

                SISTEMA

            </div>

            <button class="item">

                <i data-lucide="palette"></i>

                Aparência

            </button>

            <button class="item">

                <i data-lucide="folder-open"></i>

                Presets

            </button>

            <button class="item">

                <i data-lucide="settings"></i>

                Configurações

            </button>

        </div>

    </aside>

    <!-- CONTEÚDO -->

    <main>

        <!-- TOPO -->

        <header>

            <div>

                <h2>

                    Dashboard

                </h2>

                <span>

                    Bem-vindo ao CN Live Suite

                </span>

            </div>

            <div class="top-buttons">

                <button>

                    Salvar

                </button>

                <button>

                    Atualizar

                </button>

            </div>

        </header>

        <!-- CORPO -->

        <section class="content">

            <div class="left">

                <div class="card">

                    <h3>Status</h3>

                    <div class="status">

                        <span class="green"></span>

                        Overlay Online

                    </div>

                    <div class="status">

                        <span class="red"></span>

                        WebSocket Offline

                    </div>

                    <div class="status">

                        <span class="red"></span>

                        Twitch Offline

                    </div>

                    <div class="status">

                        <span class="red"></span>

                        Kick Offline

                    </div>

                    <div class="status">

                        <span class="red"></span>

                        YouTube Offline

                    </div>

                </div>

                <div class="card">

                    <h3>Performance</h3>

                    <p>CPU: 0%</p>

                    <p>RAM: 0 MB</p>

                    <p>FPS: 60</p>

                </div>

            </div>

            <div class="right">

                <div class="preview">

                    <div class="preview-header">

                        Preview do Overlay

                    </div>

                    <div class="preview-screen">

                        <div class="preview-logo">

                            SUA LOGO

                        </div>

                        <div class="preview-chat">

                            CHAT

                        </div>

                        <div class="preview-weather">

                            CLIMA

                        </div>

                        <div class="preview-livepix">

                            LIVEPIX

                        </div>

                    </div>

                </div>

            </div>

        </section>

    </main>

</div>

<script>

lucide.createIcons();

</script>

<script src="app.js"></script>

</body>

</html>
