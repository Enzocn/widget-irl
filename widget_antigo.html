<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>IRL Pro Widget</title>
    <style>
        body {
            background-color: transparent;
            color: white;
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
        }
        #irl-widget {
            position: absolute;
            top: 10px;
            left: 10px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: flex-start;
            font-size: 24px;
            background-color: rgba(60, 60, 60, 0.7);
            padding: 10px;
            border-radius: 8px;
        }
        .widget-item {
            display: flex;
            align-items: center;
            margin-bottom: 5px;
            color: white;
            line-height: 1;
        }
        /* Ícone (SVG) recebe a cor atual via currentColor */
        .icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-right: 10px;
            width: 30px;
            height: 30px;
            color: white; /* garante que o SVG (currentColor) fique branco */
        }
        .icon svg {
            width: 100%;
            height: 100%;
            vertical-align: middle;
        }
        /* Ajustes para texto de data/hora */
        .small-text {
            font-size: 20px;
        }
    </style>
</head>
<body>
    <div id="irl-widget"></div>

    <script>
        const apiKey = 'fcd84f2a0697a105570e69f985923fc4';
        const city = 'São Paulo';

        function formatDate(date) {
            const day = String(date.getDate()).padStart(2, '0');
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const year = date.getFullYear();
            return `${day}/${month}/${year}`;
        }

        // SVG do calendário (sem número) — usa currentColor para cor
        function calendarSVG() {
            return `
                <span class="icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" role="img" xmlns="http://www.w3.org/2000/svg" aria-label="Calendário">
                        <title>Calendário</title>
                        <rect x="3" y="5" width="18" height="16" rx="2" ry="2" fill="none" stroke="currentColor" stroke-width="1.5"></rect>
                        <path d="M16 3v4M8 3v4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path>
                        <line x1="3" y1="10" x2="21" y2="10" stroke="currentColor" stroke-width="1"></line>
                    </svg>
                </span>
            `;
        }

        function clockSVG() {
            return `
                <span class="icon" aria-hidden="true" style="width:26px;height:26px;">
                    <svg viewBox="0 0 24 24" role="img" xmlns="http://www.w3.org/2000/svg" aria-label="Relógio">
                        <title>Relógio</title>
                        <circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.5"></circle>
                        <path d="M12 7v6l4 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path>
                    </svg>
                </span>
            `;
        }

        function getWeatherEmoji(iconCode) {
            const emojis = {
                '01d': '😊☀️', '01n': '😊🌙',
                '02d': '😊🌤️', '02n': '😊☁️',
                '03d': '😊☁️', '03n': '😊☁️',
                '04d': '😊☁️', '04n': '😊☁️',
                '09d': '🌧️', '09n': '🌧️',
                '10d': '🌦️', '10n': '🌧️',
                '11d': '⛈️', '11n': '⛈️',
                '13d': '❄️', '13n': '❄️',
                '50d': '🌫️', '50n': '🌫️'
            };
            return emojis[iconCode] || '❓';
        }

        async function updateWidget() {
            const now = new Date();
            const time = now.toLocaleTimeString('pt-BR', { hour12: false });
            const date = formatDate(now);

            const widget = document.getElementById('irl-widget');
            let widgetContent = '';

            try {
                const response = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(city)}&appid=${apiKey}&units=metric&lang=pt_br`);
                const data = await response.json();

                if (data.main && data.weather) {
                    const temperature = Math.round(data.main.temp);
                    const weatherEmoji = getWeatherEmoji(data.weather[0].icon);
                    widgetContent += `<div class="widget-item"><span class="icon" style="width:34px;height:34px;">${weatherEmoji}</span> <span class="small-text">${temperature}°C</span></div>`;
                }
            } catch (error) {
                console.error('Erro ao buscar a temperatura:', error);
                // Mesmo se der erro, continuamos mostrando data/hora
            }

            // Usando o SVG de calendário (garante que NÃO apareça o número 17)
            widgetContent += `<div class="widget-item">${calendarSVG()} <span class="small-text">${date}</span></div>`;
            widgetContent += `<div class="widget-item">${clockSVG()} <span class="small-text">${time}</span></div>`;

            widget.innerHTML = widgetContent;
        }

        // Atualiza a cada 1 segundo (pode ajustar)
        setInterval(updateWidget, 1000);
        updateWidget();
    </script>
</body>
</html>
